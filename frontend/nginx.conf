# Load balancer for the two backend instances (HA). Passive health checks
# (max_fails/fail_timeout) take a failing instance out of rotation, and
# proxy_next_upstream retries the request on the healthy one.
upstream backend {
    server backend1:8080 max_fails=3 fail_timeout=15s;
    server backend2:8080 max_fails=3 fail_timeout=15s;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Supplier-invoice scans (photos/PDFs) are proxied to the backend; allow
    # uploads up to the backend's multipart limit (15 MB) plus a little slack.
    client_max_body_size 16m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # If an instance is down, transparently retry on the other one.
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    # WebSocket/STOMP notifications endpoint. A single upgraded connection stays
    # on one instance; the shared RabbitMQ relay delivers messages published by
    # any instance, so no session stickiness is required.
    location /ws {
        proxy_pass http://backend/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
