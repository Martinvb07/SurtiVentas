<h2 mat-dialog-title>{{ data.title }}</h2>

<form [formGroup]="form" (ngSubmit)="submit()">
  <mat-dialog-content class="content">
    @if (errorMessage()) {
      <div class="error-banner">{{ errorMessage() }}</div>
    }

    <p class="order-line">
      Pedido <strong>{{ data.order.orderNumber }}</strong> — {{ data.order.customerName }}
    </p>

    <mat-form-field appearance="outline">
      <mat-label>Nota (opcional)</mat-label>
      <input matInput formControlName="note" />
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" mat-dialog-close [disabled]="saving()">Cancelar</button>
    <button mat-flat-button type="submit" class="submit-button" [disabled]="saving()">
      {{ data.confirmLabel }}
    </button>
  </mat-dialog-actions>
</form>
