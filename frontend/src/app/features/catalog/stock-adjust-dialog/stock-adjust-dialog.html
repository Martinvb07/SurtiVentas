<h2 mat-dialog-title>Ajustar stock — {{ data.product.name }}</h2>

<form [formGroup]="form" (ngSubmit)="submit()">
  <mat-dialog-content class="content">
    @if (errorMessage()) {
      <div class="error-banner">{{ errorMessage() }}</div>
    }

    <div class="current-stock">
      Stock actual: <strong class="numeric">{{ data.product.stock }}</strong>
    </div>

    <mat-button-toggle-group [value]="direction()" (change)="direction.set($event.value)" class="direction-toggle">
      <mat-button-toggle value="in">Entrada</mat-button-toggle>
      <mat-button-toggle value="out">Salida</mat-button-toggle>
    </mat-button-toggle-group>

    <mat-form-field appearance="outline">
      <mat-label>Cantidad</mat-label>
      <input matInput type="number" formControlName="quantity" min="1" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Motivo</mat-label>
      <input matInput formControlName="reason" placeholder="Ej. entrada de mercancía, ajuste por conteo" />
    </mat-form-field>

    <div class="resulting-stock" [class.negative]="resultingStock < 0">
      Stock resultante: <strong class="numeric">{{ resultingStock }}</strong>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" mat-dialog-close [disabled]="saving()">Cancelar</button>
    <button mat-flat-button type="submit" class="submit-button" [disabled]="saving() || resultingStock < 0">
      Confirmar
    </button>
  </mat-dialog-actions>
</form>
