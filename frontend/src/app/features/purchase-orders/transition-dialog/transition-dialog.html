<div class="dialog" [class.is-destructive]="destructive()">
  <div class="dialog-head">
    <div class="head-icon"><mat-icon>{{ icon() }}</mat-icon></div>
    <div class="head-text">
      <h2 mat-dialog-title>{{ data.title }}</h2>
      <p class="head-sub">{{ data.purchaseOrder.orderNumber }} · {{ data.purchaseOrder.supplierName }}</p>
    </div>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <mat-dialog-content class="content">
      @if (errorMessage()) {
        <div class="error-banner">
          <mat-icon>error_outline</mat-icon>
          <span>{{ errorMessage() }}</span>
        </div>
      }

      <div class="transition">
        <span class="status-chip">{{ label(data.purchaseOrder.status) }}</span>
        <mat-icon class="arrow">arrow_forward</mat-icon>
        <span class="status-chip target" [class.danger]="destructive()">{{ label(data.targetStatus) }}</span>
      </div>

      <mat-form-field appearance="outline" class="note-field">
        <mat-label>Nota (opcional)</mat-label>
        <textarea matInput formControlName="note" rows="2" placeholder="Agrega un comentario para el historial…"></textarea>
      </mat-form-field>
    </mat-dialog-content>

    <mat-dialog-actions align="end">
      <button mat-button type="button" mat-dialog-close [disabled]="saving()">Cancelar</button>
      <button
        mat-flat-button
        type="submit"
        class="confirm-button"
        [class.danger]="destructive()"
        [disabled]="saving()"
      >
        @if (saving()) {
          <mat-spinner diameter="18" />
        } @else {
          {{ data.confirmLabel }}
        }
      </button>
    </mat-dialog-actions>
  </form>
</div>
