<h2 mat-dialog-title>Meta de {{ data.sellerName }}</h2>

<form [formGroup]="form" (ngSubmit)="submit()">
  <mat-dialog-content class="content">
    <p class="period">Mes: <strong>{{ data.month }}</strong></p>

    @if (errorMessage()) {
      <div class="error-banner">{{ errorMessage() }}</div>
    }

    <mat-form-field appearance="outline">
      <mat-label>Meta de venta (COP)</mat-label>
      <input matInput type="number" formControlName="targetAmount" min="0" />
    </mat-form-field>

    <div class="rates">
      <mat-form-field appearance="outline">
        <mat-label>Comisión base (%)</mat-label>
        <input matInput type="number" formControlName="commissionRate" min="0" max="100" step="0.1" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Bono al cumplir (%)</mat-label>
        <input matInput type="number" formControlName="bonusRate" min="0" max="100" step="0.1" />
      </mat-form-field>
    </div>

    <p class="hint">
      La comisión se calcula sobre las ventas del mes con la tasa base; si el vendedor alcanza la
      meta, se aplica la tasa base + el bono.
    </p>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" mat-dialog-close [disabled]="saving()">Cancelar</button>
    <button mat-flat-button type="submit" class="save-button" [disabled]="saving()">Guardar meta</button>
  </mat-dialog-actions>
</form>
