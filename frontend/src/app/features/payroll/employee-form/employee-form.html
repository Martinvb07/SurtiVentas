<h2 mat-dialog-title>{{ isEdit ? 'Editar empleado' : 'Nuevo empleado' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="form">
    <mat-form-field appearance="outline" class="full">
      <mat-label>Nombre completo</mat-label>
      <input matInput formControlName="fullName" maxlength="150" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Cargo</mat-label>
      <input matInput formControlName="position" maxlength="100" placeholder="Vendedor, Bodeguero…" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Salario mensual</mat-label>
      <span matTextPrefix>$&nbsp;</span>
      <input matInput type="number" formControlName="salary" min="0" />
    </mat-form-field>

    @if (isEdit) {
      <mat-slide-toggle formControlName="active">Activo</mat-slide-toggle>
    }
  </form>

  @if (errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close [disabled]="saving()">Cancelar</button>
  <button mat-flat-button color="primary" (click)="submit()" [disabled]="saving()">
    {{ saving() ? 'Guardando…' : 'Guardar' }}
  </button>
</mat-dialog-actions>
