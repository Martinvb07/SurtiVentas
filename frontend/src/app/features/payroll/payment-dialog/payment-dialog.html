<h2 mat-dialog-title>Registrar pago de nómina</h2>

<mat-dialog-content>
  <div class="summary">
    <div class="summary-row">
      <span class="label">Empleado</span>
      <span class="value">{{ data.employee.fullName }}</span>
    </div>
    <div class="summary-row">
      <span class="label">Cargo</span>
      <span class="value">{{ data.employee.position }}</span>
    </div>
    <div class="summary-row total">
      <span class="label">Salario</span>
      <span class="value numeric">{{ data.employee.salary | currency: 'COP' : 'symbol-narrow' : '1.0-0' }}</span>
    </div>
  </div>

  <form [formGroup]="form" class="form">
    <mat-form-field appearance="outline" class="full">
      <mat-label>Monto a pagar</mat-label>
      <span matTextPrefix>$&nbsp;</span>
      <input matInput type="number" formControlName="amount" min="0.01" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Periodo</mat-label>
      <input matInput formControlName="period" maxlength="30" placeholder="2026-07, Julio 2026, Quincena 1…" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Nota (opcional)</mat-label>
      <input matInput formControlName="note" maxlength="255" />
    </mat-form-field>
  </form>

  @if (errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close [disabled]="saving()">Cancelar</button>
  <button mat-flat-button color="primary" (click)="submit()" [disabled]="saving()">
    {{ saving() ? 'Registrando…' : 'Registrar pago' }}
  </button>
</mat-dialog-actions>
