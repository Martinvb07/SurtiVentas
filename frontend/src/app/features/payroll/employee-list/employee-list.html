<div class="list-page">
  <header class="list-head">
    <div>
      <h1>Nómina</h1>
      <p class="subtitle">Empleados y pagos de nómina</p>
    </div>
    <button mat-flat-button color="primary" (click)="openCreate()">
      <mat-icon>person_add</mat-icon>
      Nuevo empleado
    </button>
  </header>

  @if (employees().length) {
    <div class="table-card">
      <table mat-table [dataSource]="employees()">
        <ng-container matColumnDef="fullName">
          <th mat-header-cell *matHeaderCellDef>Empleado</th>
          <td mat-cell *matCellDef="let e">{{ e.fullName }}</td>
        </ng-container>

        <ng-container matColumnDef="position">
          <th mat-header-cell *matHeaderCellDef>Cargo</th>
          <td mat-cell *matCellDef="let e">{{ e.position }}</td>
        </ng-container>

        <ng-container matColumnDef="salary">
          <th mat-header-cell *matHeaderCellDef class="right">Salario</th>
          <td mat-cell *matCellDef="let e" class="right numeric">
            {{ e.salary | currency: 'COP' : 'symbol-narrow' : '1.0-0' }}
          </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Estado</th>
          <td mat-cell *matCellDef="let e">
            <span class="chip" [class.is-active]="e.active" [class.is-inactive]="!e.active">
              {{ e.active ? 'Activo' : 'Inactivo' }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="right"></th>
          <td mat-cell *matCellDef="let e" class="right">
            <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Acciones">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #menu="matMenu">
              <button mat-menu-item (click)="registerPayment(e)" [disabled]="!e.active">
                <mat-icon>payments</mat-icon>
                <span>Registrar pago</span>
              </button>
              <button mat-menu-item (click)="viewPayments(e)">
                <mat-icon>history</mat-icon>
                <span>Ver pagos</span>
              </button>
              <button mat-menu-item (click)="edit(e)">
                <mat-icon>edit</mat-icon>
                <span>Editar</span>
              </button>
              <button mat-menu-item (click)="deactivate(e)" [disabled]="!e.active">
                <mat-icon>person_off</mat-icon>
                <span>Desactivar</span>
              </button>
            </mat-menu>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>
  } @else if (!loading()) {
    <div class="empty-state">
      <mat-icon>groups</mat-icon>
      <p>No hay empleados registrados.</p>
    </div>
  }
</div>
