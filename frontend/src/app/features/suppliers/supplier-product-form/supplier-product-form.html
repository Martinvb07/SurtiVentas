<h2 mat-dialog-title>{{ isEdit ? 'Editar producto del proveedor' : 'Agregar producto al catálogo' }}</h2>

<form [formGroup]="form" (ngSubmit)="submit()">
  <mat-dialog-content class="content">
    @if (errorMessage()) {
      <div class="error-banner">{{ errorMessage() }}</div>
    }

    <mat-form-field appearance="outline">
      <mat-label>Producto</mat-label>
      <mat-select formControlName="productId">
        @for (product of products(); track product.id) {
          <mat-option [value]="product.id">{{ product.name }} ({{ product.sku }})</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <div class="row">
      <mat-form-field appearance="outline">
        <mat-label>Código del proveedor (opcional)</mat-label>
        <input matInput formControlName="supplierSku" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Precio de compra</mat-label>
        <input matInput type="number" formControlName="cost" min="0" />
      </mat-form-field>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" mat-dialog-close [disabled]="saving()">Cancelar</button>
    <button mat-flat-button type="submit" class="submit-button" [disabled]="saving()">
      {{ isEdit ? 'Guardar cambios' : 'Agregar' }}
    </button>
  </mat-dialog-actions>
</form>
