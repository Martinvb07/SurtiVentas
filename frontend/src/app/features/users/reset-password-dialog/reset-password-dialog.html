<h2 mat-dialog-title>Resetear contraseña</h2>

<mat-dialog-content>
  <p class="who">{{ data.user.fullName }} · {{ data.user.email }}</p>

  <form [formGroup]="form">
    <mat-form-field appearance="outline" class="full">
      <mat-label>Nueva contraseña</mat-label>
      <input matInput type="password" formControlName="password" />
      <mat-hint>Mínimo 6 caracteres</mat-hint>
    </mat-form-field>
  </form>

  @if (errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close [disabled]="saving()">Cancelar</button>
  <button mat-flat-button color="primary" (click)="submit()" [disabled]="saving()">
    {{ saving() ? 'Guardando…' : 'Actualizar contraseña' }}
  </button>
</mat-dialog-actions>
