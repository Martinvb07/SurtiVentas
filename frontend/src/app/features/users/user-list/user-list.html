<div class="list-page">
  <header class="list-head">
    <div>
      <h1>Usuarios</h1>
      <p class="subtitle">Cuentas para entrar al sistema</p>
    </div>
    <button mat-flat-button color="primary" (click)="openCreate()">
      <mat-icon>person_add</mat-icon>
      Nuevo usuario
    </button>
  </header>

  @if (users().length) {
    <div class="table-card">
      <table mat-table [dataSource]="users()">
        <ng-container matColumnDef="fullName">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let u">{{ u.fullName }}</td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Correo</th>
          <td mat-cell *matCellDef="let u">{{ u.email }}</td>
        </ng-container>

        <ng-container matColumnDef="role">
          <th mat-header-cell *matHeaderCellDef>Rol</th>
          <td mat-cell *matCellDef="let u">{{ roleLabel(u.role) }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Estado</th>
          <td mat-cell *matCellDef="let u">
            <span class="chip" [class.is-active]="u.active" [class.is-inactive]="!u.active">
              {{ u.active ? 'Activo' : 'Inactivo' }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="right"></th>
          <td mat-cell *matCellDef="let u" class="right">
            <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Acciones">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #menu="matMenu">
              <button mat-menu-item (click)="edit(u)">
                <mat-icon>edit</mat-icon>
                <span>Editar</span>
              </button>
              <button mat-menu-item (click)="resetPassword(u)">
                <mat-icon>key</mat-icon>
                <span>Resetear contraseña</span>
              </button>
              <button mat-menu-item (click)="toggleActive(u)">
                <mat-icon>{{ u.active ? 'person_off' : 'person' }}</mat-icon>
                <span>{{ u.active ? 'Desactivar' : 'Activar' }}</span>
              </button>
            </mat-menu>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>
  } @else if (!loading()) {
    <div class="empty-state">
      <mat-icon>manage_accounts</mat-icon>
      <p>No hay usuarios.</p>
    </div>
  }
</div>
