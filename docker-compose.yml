services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      # Host port 3307 to avoid clashing with a native MySQL install on
      # 3306; the backend talks to the container over the internal Docker
      # network on 3306 regardless (see DB_URL), so this only affects
      # connecting from a host tool like MySQL Workbench.
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - surtiventas-net

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION_MS: ${JWT_ACCESS_EXPIRATION_MS}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      OCR_SERVICE_URL: ${OCR_SERVICE_URL}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      ocr:
        condition: service_healthy
    networks:
      - surtiventas-net

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - surtiventas-net

  # Tesseract OCR microservice for supplier-invoice reconciliation (Fase 2).
  # A tiny stdlib-Python HTTP wrapper around the tesseract binary; only the
  # backend talks to it over the internal network, so no host port is exposed.
  ocr:
    build:
      context: ./ocr
    restart: unless-stopped
    expose:
      - "8000"
    # Use 127.0.0.1, not localhost: in the Alpine container localhost can
    # resolve to IPv6 (::1) while the service binds IPv4, giving a false
    # "connection refused" and a perpetually unhealthy container.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - surtiventas-net

networks:
  surtiventas-net:
    driver: bridge

volumes:
  mysql_data:
