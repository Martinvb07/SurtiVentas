spring:
  application:
    name: surtiventas-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    default-property-inclusion: non_null
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  servlet:
    multipart:
      # Supplier-invoice scans (photos/PDFs). Keep in sync with the OCR
      # service's OCR_MAX_BYTES and nginx client_max_body_size.
      max-file-size: 15MB
      max-request-size: 15MB

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

ocr:
  service:
    # OCR microservice base URL. Defaults to the compose service name; override
    # with OCR_SERVICE_URL when running the backend outside Docker.
    url: ${OCR_SERVICE_URL:http://ocr:8000}
