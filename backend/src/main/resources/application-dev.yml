spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/surtiventas?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:surtiventas}
    password: ${DB_PASSWORD:surtiventas}
  jpa:
    show-sql: true

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-do-not-use-in-production-please-change-me-1234567890}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

logging:
  level:
    com.surtiventas: DEBUG
    org.springframework.security: INFO
