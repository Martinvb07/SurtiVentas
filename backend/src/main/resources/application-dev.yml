spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/surtiventas?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:surtiventas}
    # No literal fallback on purpose: even a "dev-only" credential
    # shouldn't be a hardcoded string in a committed file. Export
    # DB_PASSWORD (and JWT_SECRET below) before running locally — see
    # README "Desarrollo local sin Docker".
    password: ${DB_PASSWORD}
  jpa:
    show-sql: true

app:
  jwt:
    secret: ${JWT_SECRET}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

logging:
  level:
    com.surtiventas: DEBUG
    org.springframework.security: INFO
